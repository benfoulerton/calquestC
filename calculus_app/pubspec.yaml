name: calculus_quest
description: A Duolingo-style calculus learning app powered by Stewart Calculus 9e.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State / routing
  provider: ^6.1.2
  go_router: ^13.2.0

  # Persistence
  shared_preferences: ^2.2.2

  # Math rendering
  flutter_math_fork: ^0.7.2

  # Animations & UI
  animations: ^2.0.11
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/stewart_calculus_course.json
