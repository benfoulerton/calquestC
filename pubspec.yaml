name: calculus_quest
description: Duolingo-style calculus learning, ADHD-friendly, Material 3 Expressive.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State / routing
  provider: ^6.1.2
  go_router: ^13.2.0

  # Persistence
  shared_preferences: ^2.2.2

  # Material 3 Expressive
  dynamic_color: ^1.7.0
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
